<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Cốt Truyện</title>
    
    <link rel="icon" href="teriri.jpg" type="image/png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <img src="teriri.jpg" alt="Logo" class="logo">
            <h2>Thư Viện</h2>
        </div>

        <input type="text" id="search-story" placeholder="🔍 Tìm tác phẩm..." onkeyup="filterStories()">

        <ul class="story-list" id="story-list">
            <li class="active">Ocschosia X</li>
            <li>Một tác phẩm khác</li> </ul>
    </div>

    <div class="main-content">
        
        <div id="list-view">
            <div class="list-header">
                <div>
                    <h1 id="current-story-title">Ocschosia X</h1>
                    <p class="chapter-meta">Chọn một chương bên dưới để đọc</p>
                </div>
                
                <select id="sort-select" onchange="sortChapters()">
                    <option value="asc">Sắp xếp: Cũ nhất ➔ Mới nhất</option>
                    <option value="desc">Sắp xếp: Mới nhất ➔ Cũ nhất</option>
                </select>
            </div>

            <div id="chapters-container"></div>
        </div>

        <div id="reading-view">
            <div class="nav-controls-top">
                <button class="back-btn" onclick="showListView()">← Trở về danh sách</button>
            </div>
            <h1 id="reading-title"></h1>
            <div class="chapter-meta" id="reading-meta"></div>
            <div class="chapter-body" id="reading-body"></div>
            <div class="chapter-navigation">
                <button id="prev-btn" onclick="navChapter(-1)">← Chương trước</button>
                <button id="next-btn" onclick="navChapter(1)">Chương sau →</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
