<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Han's Blog</title>
    <link rel="icon" href="teriri.jpg" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="brand">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="teriri.jpg" alt="Logo" class="logo">
                <h2>Thư Viện</h2>
            </div>
            
            <button id="theme-toggle" class="theme-btn" onclick="toggleTheme()" title="Đổi giao diện">
                <img id="theme-icon" class="theme-icon" src="" alt="Theme">
            </button>
        </div>
        <ul class="story-list" id="sidebar-story-list"></ul>
    </div>

    <div class="main-content">
        
        <div class="mobile-nav">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <span class="mobile-nav-title">Menu</span>
            </div>
            
            <button id="mobile-theme-toggle" class="theme-btn" onclick="toggleTheme()">
                <img id="mobile-theme-icon" class="theme-icon" src="" alt="Theme">
            </button>
        </div>

        <div id="home-view">
            <div class="list-header">
                <div>
                    <h1>Tác phẩm của tôi</h1>
                    <p class="chapter-meta">Chọn một bộ truyện để bắt đầu đọc</p>
                </div>
                <div class="home-filters">
                    <input type="text" id="search-story" placeholder="🔍 Tìm tên truyện..." onkeyup="filterHomeStories()">
                    <select id="sort-home-select" onchange="sortHomeStories()">
                        <option value="az">Tên: A ➔ Z</option>
                        <option value="za">Tên: Z ➔ A</option>
                        <option value="most">Chương: Nhiều nhất</option>
                        <option value="least">Chương: Ít nhất</option>
                    </select>
                </div>
            </div>
            <div id="stories-grid" class="story-grid"></div>
        </div>

        <div id="list-view" style="display: none;">
            <div class="nav-controls-top">
                <button class="back-btn" onclick="showHomeView()">← Trở về Trang chủ</button>
            </div>
            <div class="list-header">
                <div>
                    <h1 id="current-story-title">Tên Truyện</h1>
                    <p class="chapter-meta" id="chapter-count-meta">Đang tải...</p>
                </div>
                <select id="sort-select" onchange="sortChapters()">
                    <option value="asc">Sắp xếp: Cũ nhất ➔ Mới nhất</option>
                    <option value="desc">Sắp xếp: Mới nhất ➔ Cũ nhất</option>
                </select>
            </div>
            <div id="chapters-container"></div>
        </div>

        <div id="reading-view" style="display: none;">
            <div class="nav-controls-top">
                <button class="back-btn" onclick="showListView()">← Trở về Mục lục</button>
            </div>
            <h1 id="reading-title"></h1>
            <div class="chapter-meta" id="reading-meta"></div>
            <div class="chapter-body" id="reading-body"></div>
            <div class="chapter-navigation">
                <button id="prev-btn" onclick="navChapter(-1, this)">← Trước</button>
                <button id="next-btn" onclick="navChapter(1, this)">Sau →</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
